<!DOCTYPE html>
<head>
    <title>🫘</title>
    <style>
        body {
            background-color: white;
        }

        #center-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            min-height: 100vh;
        }

        .button {
            font-size: 50px;
            font-family:Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            border: 10px black solid;
            cursor:grab;
        }


    </style>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
</head>
<body>
    <div id="center-screen">
        <button class="button">Spill The Beans</button>
    </div>
    <img style="height:30%; width:30%; display: none;" class="b1" src="../images/b1.jpeg">
    <img style="height:30%; width:30%; display: none;" class="b2" src="../images/b2.jpeg">
    <img style="height:50%; width:50%; display: none;" class="b3" src="../images/b3.jpeg">
    <img style="height:50%; width:50%; display: none;" class="b4" src="../images/b4.jpeg">
    <img style="height:30%; width:30%; display: none;" class="b5" src="../images/b1.jpeg">
    <img style="height:30%; width:30%; display: none;" class="b6" src="../images/b2.jpeg">
    <img style="height:50%; width:50%; display: none;" class="b7" src="../images/b3.jpeg">
    <img style="height:50%; width:50%; display: none;" class="b8" src="../images/b4.jpeg">
    <audio id="forever" src="../sounds/forever_bean.mp3" ></audio>

    <div id="info" style="display: none">
        <p style="font-size: 40px">Where I spilled the beans:</p>
        <iframe src="https://www.google.com/maps/d/u/0/embed?mid=1UZ_NbjKhb-HF2GrCCMm3c890nkT3-8k&ehbc=2E312F" width="640" height="480"></iframe>
    </div>


    <script>
        $(".button").click(function(){
            $("#center-screen").remove();
            $("#info").css("display", "block");
            setTimeout(function() {
                forever.play();
            }, 2000);

            var bodyElement = document.querySelector("body");
         
            var delay = 0;
            
            function changeColor() {
                delay++;

                if (delay > 102) {
                    $("body").css("backgroundColor", getRandomColor())
                    delay = 0;
                }
            
                requestAnimationFrame(changeColor);
            }
            changeColor();           
            
            function getRandomColor() {
                // creating a random number between 0 and 255
                var r = Math.floor(Math.random()*256);
                var g = Math.floor(Math.random()*256);
                var b = Math.floor(Math.random()*256);
                
                // going from decimal to hex
                var hexR = r.toString(16);
                var hexG = g.toString(16);
                var hexB = b.toString(16);
                
                // making sure single character values are prepended with a "0"
                if (hexR.length == 1) {
                    hexR = "0" + hexR;
                }
                
                if (hexG.length == 1) {
                    hexG = "0" + hexG;
                }
            
                if (hexB.length == 1) {
                    hexB = "0" + hexB;
                }
            
                // creating the hex value by concatenatening the string values
                var hexColor = "#" + hexR + hexG + hexB;
                return hexColor.toUpperCase();
            }


            const timer = ms => new Promise(res => setTimeout(res, ms))
            function change(elem) {
                var x = Math.random() * 5000;
                var denom = 70
                console.log((x/denom).toString().concat("%"));
                $(elem).fadeToggle(x);
                $(elem).css({"height": (x/denom).toString().concat("%"), "width": (x/denom).toString().concat("%")});
            }
            async function load() {
                while(true) {
                    change(".b1");
                    change(".b2");
                    change(".b3");
                    change(".b4");
                    change(".b5");
                    change(".b6");
                    change(".b7");
                    change(".b8");
                    await timer(3000);
                }
            }
            load();
        });
    </script>
</body>

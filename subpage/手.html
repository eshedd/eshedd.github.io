<!DOCTYPE html>
<html>

<head>
    <title>🖐</title>
    <style>
        body {
            background-color: orange;
            background-image: none;
        }

        h1 {
            color: rgb(255, 222, 5);
            font-size: 50px;
            font-family:Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            text-shadow:0px 2px 4px black;
        }
        
        .div1 {
            display: flex;
            flex-direction: column;
            flex-wrap:nowrap;
        }

        input[type="checkbox"] {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
        }
        #toggle {
            height: 32px;
            width: 52px;
            border-radius: 16px;
            display: inline-block;
            position: relative;
            border: 2px solid black;
            background: linear-gradient(90deg, grey 0%, rgb(255, 222, 5) 100%);
            transition: all .2s ease;
        }
        #toggle:after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: white;
            /* background: rgb(255, 233, 88) */
            box-shadow: 0 1px 3px black;
            transition: all .2s cubic-bezier(.5,.1,.75,1.35);
        }
        #toggle:checked {
            border-color: black;
        }
        #toggle:checked:after {
            transform: translatex(20px)
        }
        #balance {
            background-color: #c0c0c0;
            position:fixed;
            top:0;
            width:100%;
            z-index:100;
            display:hidden;
        }
    </style>
    <script>
        window.onload = function() {
            var balance = getCookie("balance");
            if (!balance == '') {
                var balanceElem = document.getElementById("mybalance");
                balanceElem.style.display = "block";
                balanceElem.innerHTML = "eCoin Balance: " + balance;
            } else {
                console.log('what');
            }
        };
        function getCookie(cname) {
            let name = cname + "=";
            let decodedCookie = decodeURIComponent(document.cookie);
            let ca = decodedCookie.split(';');
            console.log(ca);
            for(let i = 0; i <ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) == ' ') {
                    c = c.substring(1);
                }
                if (c.indexOf(name) == 0) {
                return c.substring(name.length, c.length);
                }
            }
            return "";
        }
        function change() {
            var toggle = document.getElementById('toggle');
            var img = document.getElementById("img").style;
            var titles = document.getElementsByTagName('H1');
            for(i = 0; i < titles.length; i++) {
                var title = titles[i];
                if (toggle.checked) {
                    title.innerHTML = "李一蛋"
                    title.style.color = "rgb(255, 233, 88)";
                    title.style.fontFamily = "STFangsong, Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif"
                    title.style.textShadow = "0px 0px 0px black";
                    document.body.style.backgroundImage = 'url("../images/stars.png"), url("../images/newyear.png")';
                    img.border = "5px solid rgb(255, 222, 5)";
                } else {
                    title.innerHTML = "Ethan Shedd?"
                    title.style.color = "rgb(255, 222, 5)";
                    title.style.fontFamily = "Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif"
                    title.style.textShadow = "0px 2px 4px black";
                    document.body.style.backgroundColor = "orange";
                    document.body.style.backgroundImage = "none";
                    img.border = "5px solid #555";
                }
            }
        }
    </script>
</head>

<body>
    <h1 id="title">Ethan Shedd?</h1>
    <div class="div1">
        <img id="img" style="width:700px;height:550px;border: 5px solid #555;border-radius:10px;" 
            src="../images/HANDMAP.jpg" alt="psst click the finger" usemap="#Map"/>
        <map name="Map" id="Map">
            <area alt="pinky finger" href="./beans.html" shape="poly"
                coords="173,170, 203,161, 262,296, 220,330"/>
            <area alt="thumbkin" href="./oldify.html" shape="poly"
                coords="548,273, 476,368, 492,467, 582,298"/>
            <area alt="pointer" href="./petplayground.html" shape="poly"
                coords="256,90, 256,223, 274,299, 314,281, 294,87"/>
            <!-- <area alt="ring finger" href="./morality.html" shape="poly"
                coords="441,97, 389,267, 435,300, 475,105"/> -->

        <input type="checkbox" id="toggle" onclick="change();">
    </div>
    <div>
        <p id="balance"></p>
    </div>

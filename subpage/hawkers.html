<!DOCTYPE html>
    <html>
        <head>
            <title>Page Title</title>
            <style>
                html {
                    cursor:url(../images/scooter.png), auto;
                }
                body {
                    background:url(../images/hawkers-fire.jpg);
                }
                h1 {
                    text-align: center;
                    font-family:'Times New Roman', Times, serif;

        </div>
        <audio id="audio" src="../sounds/grind.wav" ></audio>
    </body>
